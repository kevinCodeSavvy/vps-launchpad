name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launchpad/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: launchpad

      - name: Run tests
        run: npm test
        working-directory: launchpad

  docker-build:
    name: Dockerfile build check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: launchpad/Dockerfile
          push: false
          tags: vps-launchpad:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-lint:
    name: Compose file validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Create stub .env files
        run: |
          for dir in core/caddy core/watchtower core/tailscale core/searxng core/karakeep core/cadvisor modules/n8n modules/paperclip modules/monitoring; do
            if [ -f "$dir/example.env" ]; then
              cp "$dir/example.env" "$dir/.env"
            else
              touch "$dir/.env"
            fi
          done

      - name: Validate all compose files
        run: |
          failed=0
          for dir in core/caddy core/watchtower core/tailscale core/searxng core/karakeep core/cadvisor modules/n8n modules/paperclip modules/monitoring; do
            echo -n "Validating $dir... "
            if docker compose -f "$dir/docker-compose.yaml" config --quiet 2>/dev/null; then
              echo "✓"
            else
              echo "✗ FAILED"
              failed=1
            fi
          done
          exit $failed
