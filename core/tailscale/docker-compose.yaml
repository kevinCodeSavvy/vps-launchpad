services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ${TAILSCALE_HOSTNAME:-homelab}
    restart: unless-stopped
    env_file:
      - ${ENV_DIR}/tailscale.env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
    networks:
      - caddy_default

volumes:
  tailscale-state:

networks:
  caddy_default:
    name: caddy_default
    external: true
