services:
  caddy:
    build: .
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    env_file:
      - ${ENV_DIR}/caddy.env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      # Docker Desktop local ports — unused in VPS mode but harmless to publish
      - "8080:8080"   # SearXNG
      - "3002:3002"   # Karakeep
      - "3100:3100"   # Paperclip
      - "5678:5678"   # n8n
      - "3001:3001"   # Grafana
    volumes:
      - ${DATA_DIR}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - caddy_default

volumes:
  caddy-data:
  caddy-config:

networks:
  caddy_default:
    name: caddy_default
    driver: bridge
