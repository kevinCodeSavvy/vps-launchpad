services:
  caddy:
    build: .
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - caddy_default

volumes:
  caddy-data:
  caddy-config:

networks:
  caddy_default:
    name: caddy_default
    driver: bridge
