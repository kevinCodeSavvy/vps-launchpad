name: Monitoring
description: Full observability stack. Grafana dashboards, Loki log aggregation, Prometheus metrics, container stats, and push metrics support.
icon: "📊"
subdomain: grafana
port: 3001
env:
  - key: GF_SERVER_ROOT_URL
    label: Grafana URL
    auto: "https://grafana.{domain}"
  - key: GF_SERVER_DOMAIN
    label: Grafana domain
    auto: "grafana.{domain}"
