services:
  paperclip-db:
    image: postgres:17-alpine
    container_name: paperclip-db
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - paperclip-pgdata:/var/lib/postgresql/data
    networks:
      - caddy_default

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip
    hostname: paperclip
    restart: unless-stopped
    env_file:
      - ${ENV_DIR}/paperclip.env
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@paperclip-db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      CLAUDE_CONFIG_DIR: /paperclip/.claude
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /paperclip/.claude/projects
        chmod -R 777 /paperclip/.claude
        PNPM=/usr/local/bin/pnpm
        DATADIR=/paperclip/instances/default
        $PNPM paperclipai onboard -d $DATADIR --bind loopback -y 2>/dev/null || true
        chmod -R 777 /paperclip/instances 2>/dev/null || true
        node -e "try{const fs=require('fs'),p='$DATADIR/config.json',c=JSON.parse(fs.readFileSync(p));c.server.deploymentMode='authenticated';c.server.bind='lan';c.server.host='0.0.0.0';fs.writeFileSync(p,JSON.stringify(c,null,2))}catch(e){}" 2>/dev/null || true
        $PNPM paperclipai allowed-hostname "${PAPERCLIP_HOSTNAME:-paperclip.localhost}" -d $DATADIR 2>/dev/null || true
        umask 0000
        exec docker-entrypoint.sh node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/',r=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 30s
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy
    networks:
      - caddy_default

volumes:
  paperclip-pgdata:
  paperclip-data:

networks:
  caddy_default:
    name: caddy_default
    external: true
