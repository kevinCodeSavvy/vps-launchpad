name: Paperclip
description: AI agent platform. Run Claude agents that can write code, browse the web, and manage your projects — with built-in cost tracking.
icon: "📎"
subdomain: paperclip
port: 3100
claude_subscription_auth: true
env:
  - key: ANTHROPIC_API_KEY
    label: Anthropic API Key
    secret: true
    guide: |
      1. Go to https://console.anthropic.com/settings/keys
      2. Click 'Create Key'
      3. Copy and paste here
  - key: OPENAI_API_KEY
    label: OpenAI API Key (optional)
    secret: true
    required: false
    guide: |
      1. Go to https://platform.openai.com/api-keys
      2. Click 'Create new secret key'
      3. Copy and paste here. Leave blank to skip.
  - key: GITHUB_PERSONAL_ACCESS_TOKEN
    label: GitHub Personal Access Token (optional)
    secret: true
    required: false
    guide: |
      1. Go to https://github.com/settings/tokens
      2. Click 'Generate new token (classic)'
      3. Select scopes: repo, workflow
      4. Copy and paste here. Leave blank to skip.
  - key: PAPERCLIP_PUBLIC_URL
    label: Paperclip public URL
    auto: "https://paperclip.{domain}"
